apiVersion: batch/v1
kind: CronJob
metadata:
  name: build-doctor-fix
  namespace: factory
  labels:
    app: build-doctor
    component: fixer
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 10
  jobTemplate:
    metadata:
      labels:
        app: build-doctor
        component: fixer
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 3600
      template:
        metadata:
          labels:
            app: build-doctor
            component: fixer
        spec:
          restartPolicy: Never
          serviceAccountName: build-doctor
          containers:
            - name: build-doctor
              image: ghcr.io/timholm/build-doctor:latest
              imagePullPolicy: Always
              command: ["build-doctor", "fix"]
              env:
                - name: FACTORY_DATA_DIR
                  value: /data
                - name: FACTORY_GIT_DIR
                  value: /git
                - name: ANTHROPIC_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: anthropic-credentials
                      key: api-key
                - name: MAX_FIX_ATTEMPTS
                  value: "3"
                - name: GITHUB_USER
                  value: build-doctor-bot
              volumeMounts:
                - name: factory-data
                  mountPath: /data
                - name: factory-git
                  mountPath: /git
              resources:
                requests:
                  memory: 128Mi
                  cpu: 100m
                limits:
                  memory: 512Mi
                  cpu: 500m
          volumes:
            - name: factory-data
              persistentVolumeClaim:
                claimName: factory-data-pvc
            - name: factory-git
              persistentVolumeClaim:
                claimName: factory-git-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: build-doctor-api
  namespace: factory
  labels:
    app: build-doctor
    component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: build-doctor
      component: api
  template:
    metadata:
      labels:
        app: build-doctor
        component: api
    spec:
      serviceAccountName: build-doctor
      containers:
        - name: api
          image: ghcr.io/timholm/build-doctor:latest
          imagePullPolicy: Always
          command: ["build-doctor", "serve", "--addr", ":8080"]
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: FACTORY_DATA_DIR
              value: /data
            - name: FACTORY_GIT_DIR
              value: /git
          volumeMounts:
            - name: factory-data
              mountPath: /data
              readOnly: true
            - name: factory-git
              mountPath: /git
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 10
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 200m
      volumes:
        - name: factory-data
          persistentVolumeClaim:
            claimName: factory-data-pvc
        - name: factory-git
          persistentVolumeClaim:
            claimName: factory-git-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: build-doctor-api
  namespace: factory
  labels:
    app: build-doctor
    component: api
spec:
  selector:
    app: build-doctor
    component: api
  ports:
    - port: 8080
      targetPort: 8080
      name: http
      protocol: TCP
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: build-doctor
  namespace: factory
  labels:
    app: build-doctor
